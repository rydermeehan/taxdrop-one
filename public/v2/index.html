<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <base href="/v2/" />
  <title>TaxDrop One — Strategy Recommender (v2 preview)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; }
    body {
      font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
      background: #e9efe9; color: #16241c;
      -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility;
    }
    ::selection { background: #cfe6d8; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes pulseDot { 0%, 100% { opacity: .35; transform: scale(.8); } 50% { opacity: 1; transform: scale(1.15); } }
    @keyframes spin { to { transform: rotate(360deg); } }
    button { font-family: inherit; }
    /* Google Places autocomplete dropdown — match the v2 look */
    .pac-container { z-index: 9999; border-radius: 12px; border: 1px solid #e2e8e2; box-shadow: 0 18px 40px -20px rgba(20,40,28,.4); font-family: 'Plus Jakarta Sans', system-ui, sans-serif; margin-top: 4px; }
    .pac-item { padding: 8px 12px; font-size: 14px; cursor: pointer; }
    .pac-item:hover, .pac-item-selected { background: #eef7f1; }
    .pac-item-query { font-size: 14px; color: #16241c; }
  </style>
  <!-- Google Places for the address autocomplete. -->
  <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCxv3yJzOu2fvLyjfyOy6uyo8McABVQbSE&libraries=places&loading=async" async defer></script>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- Reuse the Evidence Analyzer engine for CAD-evidence parsing + analysis. -->
  <script src="/evidence-analyzer/analyzer.js"></script>
  <script src="/evidence-analyzer/extract.js"></script>

  <!-- Vercel Blob client upload — evidence files go straight to Blob via
       /api/blob-upload. Without this, uploadEvidence() silently no-ops and
       the agent queue shows "No county evidence uploaded". -->
  <script type="module">
    import { upload } from "https://esm.sh/@vercel/blob@0.27.3/client";
    window.blobClientUpload = upload;
    window.dispatchEvent(new Event("td-blob-ready"));
  </script>

  <script type="text/babel" src="app.jsx"></script>
</body>
</html>
